# Netlify build & deploy config for allbriton.com
#
# This is a static site (no build step). Netlify auto-detects publish dir
# when this file is at the repo root and `publish` points to current dir.

[build]
  command = "python3 scripts/build-projects.py"
  publish = "."

# ─── Redirects ────────────────────────────────────────────────────────────
# Old Squarespace URLs → new project pages.
# Squarespace served /work/<slug>; the new site uses /project.html?p=<slug>.
# 301 = permanent redirect, preserves SEO link equity.

[[redirects]]
  from = "/work/:slug"
  to = "/project.html?p=:slug"
  status = 301
  force = true

[[redirects]]
  from = "/work"
  to = "/"
  status = 301
  force = true

# Old Squarespace contact page → new About page (which has contact info)
[[redirects]]
  from = "/contact-1"
  to = "/about.html"
  status = 301
  force = true
[[redirects]]
  from = "/contact"
  to = "/about.html"
  status = 301
  force = true

# Pretty URLs — these don't break anything, just allow shorter links if shared.
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200
[[redirects]]
  from = "/projects/:slug"
  to = "/project.html?p=:slug"
  status = 200

# ─── Headers ──────────────────────────────────────────────────────────────
# Cache static assets aggressively. HTML/JSON stay short-lived so content
# updates appear quickly when Decap commits.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security baseline (lightweight; tune if needed)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
