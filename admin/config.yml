# Decap CMS configuration for allbriton.com
# Edits commit straight back to the GitHub repo via Netlify's Git Gateway.

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'
    uploadMedia: 'CMS: upload "{{path}}"'
    deleteMedia: 'CMS: delete "{{path}}"'

# Where uploaded images/videos go and how they're referenced in JSON
media_folder: "assets/projects"
public_folder: "/assets/projects"

# Editorial workflow gives you a Save → Review → Publish pipeline.
# Useful when you want to draft a project before it goes live.
publish_mode: editorial_workflow

collections:
  # ─── PROJECTS ────────────────────────────────────────────────────────
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    description: "Each entry corresponds to one project page on the site."
    files:
      - file: "data/projects.json"
        name: "projects_data"
        label: "All projects (single JSON file)"
        # Decap can edit a single JSON file as a structured form.
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Hero line", name: "hero_line", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
          - label: "Tag taxonomy (filter bar)"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - { label: "Slug (URL identifier)", name: "slug", widget: "string", hint: "Lowercase, hyphenated. Used as project.html?p=<slug>." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Client", name: "client", widget: "string", required: false }
              - { label: "Project name", name: "project", widget: "string", required: false }
              - { label: "Year", name: "year", widget: "string", required: false }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
              - label: "Thumbnail"
                name: "thumbnail"
                widget: "object"
                fields:
                  - { label: "Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
                  - { label: "Source", name: "src", widget: "file", hint: "Image or video file" }
                  - { label: "Poster (optional)", name: "poster", widget: "file", required: false }
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
                  - { label: "Source", name: "src", widget: "file" }
              - { label: "Summary (one-liner for project card)", name: "summary", widget: "text" }
              - label: "Body"
                name: "body"
                widget: "list"
                summary: "{{fields.text}}"
                types:
                  - label: "Paragraph"
                    name: "paragraph"
                    widget: "object"
                    fields:
                      - { label: "Text", name: "text", widget: "text" }
                  - label: "Pullquote / Callout"
                    name: "callout"
                    widget: "object"
                    fields:
                      - { label: "Callout?", name: "callout", widget: "hidden", default: true }
                      - { label: "Text", name: "text", widget: "text" }
                      - { label: "Attribution (optional)", name: "attribution", widget: "string", required: false }
              - label: "Media grid"
                name: "grid"
                widget: "list"
                summary: "{{fields.type}} — {{fields.src}} (span {{fields.span}})"
                fields:
                  - { label: "Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
                  - { label: "Source", name: "src", widget: "file" }
                  - { label: "Span (1 = half width, 2 = full width)", name: "span", widget: "number", value_type: "int", min: 1, max: 2, default: 1 }
                  - { label: "Alt text (images only)", name: "alt", widget: "string", required: false }
              - { label: "External link", name: "external", widget: "string", required: false }

  # ─── PAGES (about) ───────────────────────────────────────────────────
  # Decap can also maintain markdown pages if we ever switch to a more
  # structured About page. For now the About page is generated from JS,
  # so we don't expose it in the CMS. Add here later if needed.
