# Sveltia CMS configuration for allbriton.com
#
# Projects are stored as one file per project under data/projects/<slug>.json.
# A small build script (scripts/build-projects.py) recombines them into the
# data/projects.json that the live site loads. The build runs on every Netlify
# deploy.

backend:
  name: github
  repo: allbriton/allbriton-portfolio
  branch: main
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'
    uploadMedia: 'CMS: upload "{{path}}"'
    deleteMedia: 'CMS: delete "{{path}}"'

# Where uploaded images/videos go and how they're referenced in JSON
media_folder: "assets/projects"
public_folder: "/assets/projects"

collections:
  # ─── PROJECTS (folder collection — one file per project) ────────────
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    description: "Each project page on the site. Click any project to edit it, or use the + button to add a new one."
    folder: "data/projects"
    extension: "json"
    format: "json"
    create: true
    delete: true
    slug: "{{fields.slug}}"
    identifier_field: "slug"
    summary: "{{fields.title}} ({{fields.year}}) — {{fields.client}}"
    sortable_fields: ["year", "title", "client"]
    fields:
      - { label: "Slug (URL identifier — lowercase, hyphenated)", name: "slug", widget: "string", hint: "Used in /project.html?p=<slug>. Don't change after publishing — it'll break old links." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string", required: false }
      - { label: "Project name", name: "project", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "string", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
        hint: "Must match values from the Tag Taxonomy collection (case-sensitive)."
      - label: "Thumbnail (homepage card)"
        name: "thumbnail"
        widget: "object"
        fields:
          - { label: "Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
          - { label: "Source", name: "src", widget: "file" }
          - { label: "Poster (optional, for videos)", name: "poster", widget: "file", required: false }
      - label: "Hero (top of project page)"
        name: "hero"
        widget: "object"
        fields:
          - { label: "Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
          - { label: "Source", name: "src", widget: "file" }
      - { label: "Summary (one-liner under the project title)", name: "summary", widget: "text" }
      - label: "Body"
        name: "body"
        widget: "list"
        types:
          - label: "Paragraph"
            name: "paragraph"
            widget: "object"
            fields:
              - { label: "Text", name: "text", widget: "text" }
          - label: "Pullquote / Callout"
            name: "callout"
            widget: "object"
            fields:
              - { label: "Callout?", name: "callout", widget: "hidden", default: true }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Attribution (optional)", name: "attribution", widget: "string", required: false }
      - label: "Media grid (left column on project page)"
        name: "grid"
        widget: "list"
        summary: "{{fields.type}} — {{fields.src}} (span {{fields.span}})"
        fields:
          - { label: "Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
          - { label: "Source", name: "src", widget: "file" }
          - { label: "Span (1 = half width, 2 = full width)", name: "span", widget: "number", value_type: "int", min: 1, max: 2, default: 1 }
          - { label: "Alt text (images only)", name: "alt", widget: "string", required: false }
      - { label: "External link (optional)", name: "external", widget: "string", required: false }

  # ─── SITE METADATA ──────────────────────────────────────────────────
  - name: "config"
    label: "Site & Tags"
    description: "Site-wide settings, the tag taxonomy, and project ordering."
    files:
      - file: "data/site.json"
        name: "site"
        label: "Site Settings"
        description: "Site-wide info: your name, the homepage hero text, contact info."
        fields:
          - { label: "Title (your name — appears in nav, page titles)", name: "title", widget: "string" }
          - { label: "Hero name (bold word in homepage headline)", name: "hero_name", widget: "string", hint: "Just the first word that appears in bold, e.g. 'Allbriton'." }
          - { label: "Hero intro (muted continuation of homepage headline)", name: "hero_intro", widget: "text", hint: "The rest of the homepage headline that follows the name." }
          - { label: "Tagline (short descriptor — currently unused but reserved)", name: "tagline", widget: "string", required: false }
          - { label: "Hero line (legacy subtitle field — currently unused)", name: "hero_line", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - { label: "Location (shown in homepage marquee)", name: "location", widget: "string" }

      - file: "data/tags.json"
        name: "tags"
        label: "Tag Taxonomy"
        description: "Filter categories shown on the homepage filter bar. Order here is the order on the bar."
        fields:
          - label: "Tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }

      - file: "data/projects-order.json"
        name: "order"
        label: "Project Order"
        description: "The order projects appear on the homepage. Drag to reorder. Each entry must match a project's slug. New projects are appended automatically."
        fields:
          - label: "Order (top = first on homepage)"
            name: "order"
            widget: "list"
            field: { label: "Slug", name: "slug", widget: "string" }
