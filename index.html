<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Allbriton Robbins</title>
  <meta name="description" content="Portfolio of Allbriton Robbins, strategist, creative director and writer. Selected work across branding, advertising, and marketing." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/site.css" />

  <!-- Netlify Identity (loaded so invitation/recovery links work site-wide) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
</head>
<body data-page="home">
  <header class="site-header">
    <nav class="nav" aria-label="Primary"></nav>
  </header>

  <section class="hero" id="hero"></section>

  <div class="tag-bar" id="tag-bar"></div>

  <main>
    <div class="grid" id="grid" aria-label="Selected work"></div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner"></div>
  </footer>

  <script src="data/projects.js"></script>
  <script src="js/site.js"></script>
  <script>
    // After Netlify Identity login (via invitation/recovery email), bounce to /admin/
    window.addEventListener('load', function () {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function (user) {
          if (!user) {
            window.netlifyIdentity.on('login', function () {
              document.location.href = '/admin/';
            });
          }
        });
      }
    });
  </script>
</body>
</html>
